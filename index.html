<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nouvura</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;scroll-behavior:smooth;}
body{background:#050505;color:white;overflow-x:hidden;}

/* LOADER */
#loader{
position:fixed;width:100%;height:100%;
background:black;display:flex;justify-content:center;align-items:center;
z-index:9999;font-size:30px;color:#ff0033;
animation:pulse 1s infinite alternate;
}
@keyframes pulse{from{opacity:0.4}to{opacity:1}}

/* HEADER */
header{
position:fixed;width:100%;top:0;
display:flex;justify-content:space-between;align-items:center;
padding:15px 40px;background:rgba(0,0,0,0.8);
backdrop-filter:blur(10px);z-index:999;
}
.logo img{height:45px;}
nav a{margin:0 10px;color:white;text-decoration:none;transition:0.3s;font-size:14px;}
nav a:hover{color:#00aaff;}
.lang-container {display:flex;gap:10px;margin-left:15px;}
.lang{cursor:pointer;color:#ff0033;font-weight:bold;font-size:13px;}

/* HERO */
.hero{
height:100vh;display:flex;flex-direction:column;
justify-content:center;align-items:center;text-align:center;
background:radial-gradient(circle,#000,#020a20);
padding:20px;
}
.hero h1{
font-size:clamp(30px,8vw,60px);
background:linear-gradient(45deg,#ff0033,#00aaff);
-webkit-background-clip:text;color:transparent;
animation:fadeUp 1s ease;
}
.hero p{margin-top:20px;color:#aaa;max-width:600px;}

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

/* SECTION */
.section{padding:100px 40px;max-width:1200px;margin:auto;}
.title{text-align:center;font-size:40px;margin-bottom:50px;color:#ff0033;}

/* SERVICES */
.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:40px 20px;border-radius:20px;text-align:center;
border:1px solid rgba(255,255,255,0.1);
transition:0.4s;
}
.card:hover{
transform:translateY(-10px) scale(1.02);
box-shadow:0 10px 25px rgba(255,0,51,0.4);
border-color:#ff0033;
}

/* PORTFOLIO */
.portfolio{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}
.portfolio img{
width:100%;height:250px;object-fit:cover;
border-radius:15px;transition:0.5s;cursor:pointer;
}
.portfolio img:hover{transform:scale(1.05) rotate(1deg);}

/* CONTACT */
.contact-form{text-align:center;}
.contact input{
width:100%;max-width:500px;padding:15px;margin:10px auto;
border:none;border-radius:10px;display:block;
background:#111;color:white;border:1px solid #333;
}
button{
padding:12px 20px;margin:10px;border:none;border-radius:10px;
cursor:pointer;background:#ff0033;color:white;transition:0.3s;
}
button:hover{background:#00aaff;}

/* ICONS */
.icons{margin-top:30px;display:flex;justify-content:center;gap:20px;}
.icons img{width:35px;filter:invert(1);transition:0.3s;}
.icons img:hover{transform:scale(1.2);filter:invert(0.5) sepia(1) saturate(5) hue-rotate(-50deg);}

/* FOOTER */
footer{text-align:center;padding:40px;background:black;color:#555;font-size:14px;}

/* RTL */
.rtl{direction:rtl;}
</style>
</head>

<body>

<div id="loader">NOUVURA</div>

<header>
<div class="logo">
<img src="logo.png" onerror="this.src='https://via.placeholder.com/150x50?text=NOUVURA'">
</div>

<nav>
<a href="#" id="nav-home">Accueil</a>
<a href="#services" id="nav-services">Services</a>
<a href="#contact" id="nav-contact">Contact</a>

<div class="lang-container">
<span class="lang" onclick="setLang('fr')">FR</span>
<span class="lang" onclick="setLang('en')">EN</span>
<span class="lang" onclick="setLang('ar')">AR</span>
</div>
</nav>
</header>

<section class="hero">
<h1 id="hero-title">Design inspiré, Solutions connectées.</h1>
<p id="hero-desc">Nous sommes une agence créative où l'esthétique rencontre la performance.</p>
</section>

<section class="section" id="services">
<h2 class="title" id="services-title">Services</h2>
<div class="services">
<div class="card">Branding & Graphic Design</div>
<div class="card">Web Development</div>
<div class="card">UI/UX Design</div>
<div class="card">Print Solutions</div>
</div>
</section>

<section class="section" id="portfolio">
<h2 class="title" id="port-title">Portfolio</h2>
<div class="portfolio">
<img src="Boucheriez.jpg" onerror="this.src='https://via.placeholder.com/400x300?text=Design+1'">
<img src="menu-restaurant.jpg" onerror="this.src='https://via.placeholder.com/400x300?text=Design+2'">
<img src="coffee.jpg" onerror="this.src='https://via.placeholder.com/400x300?text=Design+3'">
<img src="fast-food.jpg" onerror="this.src='https://via.placeholder.com/400x300?text=Design+4'">
</div>
</section>

<section class="section contact" id="contact">
<h2 class="title" id="contact-title">Contact</h2>
<div class="contact-form">
<input id="name" placeholder="Nom">
<input id="project" placeholder="Votre projet">
<button onclick="sendWhats()">WhatsApp</button>
<button onclick="sendMail()">Email</button>
</div>

<div class="icons">
<a href="mailto:yacineiguenene@gmail.com"><img src="https://cdn-icons-png.flaticon.com/512/732/732200.png"></a>
<a href="https://wa.me/213776532042"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png"></a>
</div>
</section>

<footer>
© Nouvura <span id="year"></span>
</footer>

<script>
document.getElementById("year").innerText=new Date().getFullYear();

window.addEventListener("load",()=>{
setTimeout(()=>{document.getElementById("loader").style.display="none";},800);
});

function sendWhats(){
let name=document.getElementById("name").value;
let project=document.getElementById("project").value;
if(!name||!project){alert("Remplissez tous les champs !");return;}
window.open(`https://wa.me/213776532042?text=${encodeURIComponent(`Bonjour, je suis ${name}. Mon projet: ${project}`)}`);
}

function sendMail(){
let name=document.getElementById("name").value;
let project=document.getElementById("project").value;
window.location.href=`mailto:yacineiguenene@gmail.com?subject=Nouveau Projet&body=Nom: ${name}%0D%0AProjet: ${project}`;
}

const translations={
en:{navHome:"Home",navServices:"Services",navContact:"Contact",heroTitle:"Inspired Design, Connected Solutions",heroDesc:"We are a creative agency where aesthetics meets performance."},
ar:{navHome:"الرئيسية",navServices:"خدماتنا",navContact:"اتصل بنا",heroTitle:"تصميم ملهم، حلول متصلة",heroDesc:"نحن وكالة إبداعية حيث يلتقي الجمال بالأداء."}
};

function setLang(lang){
if(lang==='ar'){document.body.classList.add('rtl');}else{document.body.classList.remove('rtl');}
if(!translations[lang])return;
let t=translations[lang];
document.getElementById("nav-home").innerText=t.navHome;
document.getElementById("nav-services").innerText=t.navServices;
document.getElementById("nav-contact").innerText=t.navContact;
document.getElementById("hero-title").innerText=t.heroTitle;
document.getElementById("hero-desc").innerText=t.heroDesc;
}

const observer=new IntersectionObserver((entries)=>{
entries.forEach(entry=>{
if(entry.isIntersecting){entry.target.style.opacity="1";entry.target.style.transform="translateY(0)";}
});
},{threshold:0.1});

document.querySelectorAll('.card, .portfolio img').forEach(el=>{
el.style.opacity="0";
el.style.transform="translateY(30px)";
el.style.transition="0.8s";
observer.observe(el);
});
</script>

</body>
</html>
