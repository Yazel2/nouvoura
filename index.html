<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouvura | L'excellence numérique redéfinie</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        :root {
            --bg-dark: #020617;
            --electric-blue: #3b82f6;
            --deep-purple: #8b5cf6;
            --neon-glow: 0 0 15px rgba(59, 130, 246, 0.5);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-dark);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
            cursor: none; /* المؤشر المخصص مفعل ولكن لا يحجب النقر */
        }

        /* --- Cursor Fix --- */
        #cursor {
            position: fixed; width: 20px; height: 20px; background: var(--electric-blue);
            border-radius: 50%; pointer-events: none; z-index: 10001; mix-blend-mode: screen;
            box-shadow: 0 0 20px var(--electric-blue);
        }
        #cursor-follower {
            position: fixed; width: 40px; height: 40px; border: 1px solid var(--deep-purple);
            border-radius: 50%; pointer-events: none; z-index: 10000; transition: transform 0.2s ease-out;
        }

        /* --- Canvas Behind Everything --- */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        /* --- Navigation --- */
        nav {
            position: fixed; top: 0; width: 100%; padding: 20px 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(12px); z-index: 999;
            border-bottom: 1px solid var(--glass-border);
        }
        .logo { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1.5rem; color: var(--electric-blue); text-shadow: var(--neon-glow); }

        .controls { display: flex; gap: 15px; align-items: center; }
        .lang-switch {
            background: var(--glass); border: 1px solid var(--glass-border); color: white;
            padding: 8px 12px; border-radius: 10px; cursor: pointer; outline: none; z-index: 1000;
        }

        /* --- Sections --- */
        section { padding: 120px 10%; position: relative; z-index: 10; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(3rem, 10vw, 6rem); margin-bottom: 20px; }
        .hero p { font-size: 1.3rem; color: #94a3b8; max-width: 700px; margin-bottom: 40px; }

        .btn-magnetic {
            padding: 18px 45px; background: linear-gradient(45deg, var(--electric-blue), var(--deep-purple));
            border: none; border-radius: 50px; color: white; font-weight: bold; text-decoration: none;
            text-transform: uppercase; letter-spacing: 2px; box-shadow: var(--neon-glow);
            display: inline-block; cursor: pointer; position: relative; z-index: 20;
        }

        .power-phrase { font-size: clamp(1.5rem, 5vw, 3.5rem); font-weight: 900; opacity: 0.1; margin: 40px 0; transition: 0.6s; text-align: center; }
        .power-phrase.active { opacity: 1; color: var(--electric-blue); text-shadow: var(--neon-glow); }

        /* --- Floating Menu --- */
        .bubble-container { position: fixed; bottom: 30px; right: 30px; z-index: 9999; }
        .bubble-main {
            width: 65px; height: 65px; background: var(--electric-blue); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; box-shadow: var(--neon-glow);
            cursor: pointer; position: relative; z-index: 10000;
        }
        .bubble-menu {
            position: absolute; bottom: 80px; right: 0; display: none; flex-direction: column; gap: 15px;
        }
        .bubble-menu a {
            width: 55px; height: 55px; background: rgba(139, 92, 246, 0.4); border: 1px solid var(--glass-border);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            color: white; text-decoration: none; backdrop-filter: blur(10px); transition: 0.3s;
        }

        /* --- RTL for Arabic --- */
        body.rtl { direction: rtl; font-family: 'Tajawal', sans-serif; }

        /* --- Loader --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark);
            display: flex; justify-content: center; align-items: center; z-index: 100000;
        }
    </style>
</head>
<body>

    <div id="loader"><h2 style="color:var(--electric-blue); font-family:Orbitron;">NOUVURA...</h2></div>
    
    <div id="cursor"></div>
    <div id="cursor-follower"></div>

    <canvas id="bg-canvas"></canvas>

    <nav>
        <div class="logo">NOUVURA</div>
        <div class="controls">
            <select class="lang-switch" id="langSelect" onchange="changeLanguage()">
                <option value="fr">Français</option>
                <option value="en">English</option>
                <option value="ar">العربية</option>
            </select>
            <a href="tel:0776532042" class="btn-magnetic" style="padding: 10px 20px; font-size: 0.7rem;">Call Now</a>
        </div>
    </nav>

    <section class="hero">
        <h1 id="hero-title">NOUVURA</h1>
        <p id="hero-desc">Façonner des expériences au-delà des attentes.</p>
        <a href="#about" class="btn-magnetic" id="hero-btn">Découvrir</a>
    </section>

    <section id="about">
        <div class="power-phrase" id="p1">AU-DELÀ DE L'INNOVATION</div>
        <div class="power-phrase" id="p2">PRÉCISION ABSOLUE</div>
        <div class="power-phrase" id="p3">PASSION CRÉATIVE</div>
    </section>

    <div class="bubble-container">
        <div class="bubble-menu" id="social-menu">
            <a href="https://wa.me/213776532042" target="_blank"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.facebook.com/search/top?q=nouvura%20adv" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="mailto:noveleeura@gmail.com"><i class="fas fa-envelope"></i></a>
        </div>
        <div class="bubble-main" onclick="toggleMenu()">
            <i class="fas fa-comment-dots" id="menu-icon" style="font-size: 1.5rem; color: white;"></i>
        </div>
    </div>

    <footer style="text-align:center; padding: 40px; border-top: 1px solid var(--glass-border);">
        <p>© 2026 NOUVURA | 0776532042 | noveleeura@gmail.com</p>
    </footer>

    <script>
        // 1. Loader Logic
        window.onload = () => {
            gsap.to("#loader", { opacity: 0, duration: 0.8, onComplete: () => document.getElementById('loader').remove() });
        };

        // 2. Custom Cursor (Optimized for Clicking)
        const cursor = document.getElementById('cursor');
        const follower = document.getElementById('cursor-follower');
        document.addEventListener('mousemove', (e) => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.1 });
            gsap.to(follower, { x: e.clientX - 20, y: e.clientY - 20, duration: 0.3 });
        });

        // 3. Language Logic
        const translations = {
            fr: {
                desc: "Façonner des expériences au-delà des attentes.",
                btn: "Découvrir",
                p1: "AU-DELÀ DE L'INNOVATION", p2: "PRÉCISION ABSOLUE", p3: "PASSION CRÉATIVE"
            },
            en: {
                desc: "Shaping experiences beyond expectations.",
                btn: "Discover",
                p1: "BEYOND INNOVATION", p2: "ABSOLUTE PRECISION", p3: "CREATIVE PASSION"
            },
            ar: {
                desc: "صياغة التجارب بأبعاد تتجاوز التوقعات",
                btn: "اكتشف المزيد",
                p1: "ما وراء الابتكار", p2: "دقة مطلقة", p3: "شغف إبداعي"
            }
        };

        function changeLanguage() {
            const lang = document.getElementById('langSelect').value;
            const content = translations[lang];
            
            document.getElementById('hero-desc').innerText = content.desc;
            document.getElementById('hero-btn').innerText = content.btn;
            document.getElementById('p1').innerText = content.p1;
            document.getElementById('p2').innerText = content.p2;
            document.getElementById('p3').innerText = content.p3;

            if(lang === 'ar') document.body.classList.add('rtl');
            else document.body.classList.remove('rtl');
        }

        // 4. Floating Menu
        function toggleMenu() {
            const menu = document.getElementById('social-menu');
            const isVisible = menu.style.display === 'flex';
            menu.style.display = isVisible ? 'none' : 'flex';
            if(!isVisible) gsap.from(".bubble-menu a", { y: 20, opacity: 0, stagger: 0.1 });
        }

        // 5. Particles Background
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5; this.vx = Math.random() * 0.4 - 0.2; this.vy = Math.random() * 0.4 - 0.2;
            }
            draw() { ctx.fillStyle = '#3b82f6'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); }
            update() { this.x += this.vx; this.y += this.vy; if(this.x<0 || this.x>canvas.width) this.vx *= -1; if(this.y<0 || this.y>canvas.height) this.vy *= -1; }
        }
        for(let i=0; i<80; i++) particles.push(new Particle());
        function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.update(); p.draw();}); requestAnimationFrame(anim); }
        anim();

        // 6. Scroll Effects
        gsap.registerPlugin(ScrollTrigger);
        document.querySelectorAll('.power-phrase').forEach(el => {
            gsap.to(el, { scrollTrigger: { trigger: el, start: "top 80%", toggleClass: "active" } });
        });
    </script>
</body>
</html>
