<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multilingual Support</title>
    <script>
        function switchLanguage(language) {
            const elements = document.querySelectorAll('[data-lang]');
            elements.forEach(element => {
                const langKey = element.getAttribute('data-lang');
                element.innerText = translations[language][langKey];
            });
        }

        const translations = {
            en: {
                title: 'Contact Us',
                name: 'Your Name',
                email: 'Your Email',
                submit: 'Submit',
                message: 'Your Message'
            },
            es: {
                title: 'Contáctenos',
                name: 'Tu Nombre',
                email: 'Tu Correo',
                submit: 'Enviar',
                message: 'Tu Mensaje'
            }
        };
    </script>
</head>
<body>
    <h1 data-lang="title">Contact Us</h1>
    <form id="contact-form" onsubmit="handleSubmit(event)">
        <label>
            <span data-lang="name">Your Name</span>:
            <input type="text" name="name" required>
        </label>
        <label>
            <span data-lang="email">Your Email</span>:
            <input type="email" name="email" required>
        </label>
        <label>
            <span data-lang="message">Your Message</span>:
            <textarea name="message" required></textarea>
        </label>
        <button type="submit" data-lang="submit">Submit</button>
    </form>
    <button onclick="switchLanguage('en')">English</button>
    <button onclick="switchLanguage('es')">Español</button>
    <script>
        function handleSubmit(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData);
            console.log('Form submitted:', data);
            // Here you would typically send the data to a server.
        }
    </script>
</body>
</html>
