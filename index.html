<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOUVURA | L'excellence numérique</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#020617;
    --blue:#3b82f6;
    --purple:#8b5cf6;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family: 'Inter', sans-serif;
    background:var(--bg);
    color:white;
    overflow-x:hidden;
}

/* LOADER */
#loader{
    position:fixed;
    inset:0;
    background:#020617;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
}

/* NAV */
nav{
    position:fixed;
    top:0;
    width:100%;
    padding:20px 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    z-index:1000;
}

.logo{
    font-family:Orbitron;
    color:var(--blue);
}

.controls{
    display:flex;
    gap:10px;
}

select{
    padding:8px;
    border-radius:8px;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:4rem;
}

.hero p{
    margin:20px 0;
    color:#aaa;
}

.btn{
    padding:15px 30px;
    border-radius:50px;
    background:linear-gradient(45deg,var(--blue),var(--purple));
    border:none;
    color:white;
    cursor:pointer;
}

/* SECTION */
section{
    padding:100px 10%;
}

.power{
    opacity:0.2;
    text-align:center;
    font-size:2rem;
    margin:30px 0;
    transition:0.5s;
}

.power.active{
    opacity:1;
    color:var(--blue);
}

/* FLOAT MENU */
.bubble{
    position:fixed;
    bottom:30px;
    right:30px;
}

.bubble-main{
    width:60px;
    height:60px;
    border-radius:50%;
    background:var(--blue);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.bubble-menu{
    display:none;
    flex-direction:column;
    gap:10px;
    margin-bottom:10px;
}

.bubble-menu a{
    width:50px;
    height:50px;
    border-radius:50%;
    background:var(--purple);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    text-decoration:none;
}

/* RTL */
.rtl{
    direction:rtl;
    font-family:'Tajawal';
}
</style>
</head>

<body>

<div id="loader"><h2>NOUVURA...</h2></div>

<nav>
    <div class="logo">NOUVURA</div>

    <div class="controls">
        <select id="lang">
            <option value="fr">FR</option>
            <option value="en">EN</option>
            <option value="ar">AR</option>
        </select>

        <a href="tel:0776532042" class="btn">Call</a>
    </div>
</nav>

<div class="hero">
    <h1>NOUVURA</h1>
    <p id="desc">Façonner des expériences au-delà des attentes.</p>
    <button class="btn" id="btn">Découvrir</button>
</div>

<section>
    <div class="power" id="p1">AU-DELÀ DE L'INNOVATION</div>
    <div class="power" id="p2">PRÉCISION ABSOLUE</div>
    <div class="power" id="p3">PASSION CRÉATIVE</div>
</section>

<div class="bubble">
    <div class="bubble-menu" id="menu">
        <a href="https://wa.me/213776532042">W</a>
        <a href="#">F</a>
        <a href="mailto:noveleeura@gmail.com">@</a>
    </div>
    <div class="bubble-main" id="toggle">+</div>
</div>

<footer style="text-align:center;padding:40px;">
© 2026 NOUVURA
</footer>

<script>
/* LOADER */
window.onload = () => {
    let l = document.getElementById("loader");
    l.style.display = "none";
}

/* LANGUAGE */
const data = {
fr:{
desc:"Façonner des expériences au-delà des attentes.",
btn:"Découvrir",
p1:"AU-DELÀ DE L'INNOVATION",
p2:"PRÉCISION ABSOLUE",
p3:"PASSION CRÉATIVE"
},
en:{
desc:"Shaping experiences beyond expectations.",
btn:"Discover",
p1:"BEYOND INNOVATION",
p2:"ABSOLUTE PRECISION",
p3:"CREATIVE PASSION"
},
ar:{
desc:"صياغة التجارب بأبعاد تتجاوز التوقعات",
btn:"اكتشف",
p1:"ما وراء الابتكار",
p2:"دقة مطلقة",
p3:"شغف إبداعي"
}
};

document.getElementById("lang").addEventListener("change", e=>{
    let lang = e.target.value;
    let t = data[lang];

    document.getElementById("desc").innerText = t.desc;
    document.getElementById("btn").innerText = t.btn;
    document.getElementById("p1").innerText = t.p1;
    document.getElementById("p2").innerText = t.p2;
    document.getElementById("p3").innerText = t.p3;

    if(lang==="ar"){
        document.body.classList.add("rtl");
    }else{
        document.body.classList.remove("rtl");
    }
});

/* MENU */
document.getElementById("toggle").onclick = ()=>{
    let m = document.getElementById("menu");
    m.style.display = m.style.display==="flex"?"none":"flex";
}

/* SCROLL EFFECT */
window.addEventListener("scroll", ()=>{
    document.querySelectorAll(".power").forEach(el=>{
        let pos = el.getBoundingClientRect().top;
        if(pos < window.innerHeight - 100){
            el.classList.add("active");
        }
    });
});
</script>

</body>
</html>
